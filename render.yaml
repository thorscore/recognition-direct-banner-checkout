services:
  - type: web
    name: recognition-direct-banner-checkout
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: APP_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://recognition-direct.com,https://www.recognition-direct.com,https://recognition-direct.bs.run
      - key: SHOPIFY_SHOP
        value: f375fe-2d
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_API_VERSION
        value: 2026-04
      - key: MOCK_SHOPIFY
        value: "false"
      - key: NAME_BADGE_BASE_PRICE_BREAKS
        value: 1:12.00,10:11.50,25:11.00,50:10.00,100:9.50,250:8.75,500:8.50,1000:8.00
      - key: NAME_BADGE_MAGNET_PRICE_BREAKS
        value: 1:2.25,10:2.25,25:2.25,50:2.25,100:1.90,250:1.90,500:1.75,1000:1.50
    disk:
      name: banner-artwork
      mountPath: /opt/render/project/src/data
      sizeGB: 5
